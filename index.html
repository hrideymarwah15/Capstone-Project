<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Race Intelligence - Championships</title>
    <!-- Google Fonts: Inter and Racing Sans One -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Racing+Sans+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <header>
        <h1>🏎️ F1 Race Intelligence Platform</h1>
        <p>Live Championship Leaderboards</p>

        <div class="controls-container">
            <button id="tab-drivers" class="btn active-tab">🏎️ Driver Championship</button>
            <button id="tab-constructors" class="btn">🛠️ Constructor Championship</button>
        </div>

        <div class="controls-container" style="margin-top: 15px;">
            <input type="text" id="search-input" class="search-bar" placeholder="Search...">
            <button id="theme-toggle" class="btn theme-btn">🌙 Dark Mode</button>
        </div>
    </header>

    <main>
        
        <div id="loading" class="status-message">
            Fetching championship data... 🏁
        </div>

        <div id="error" class="status-message error hidden">
            Failed to retrieve data. Please check your connection and try again.
        </div>

        <div id="standings-container" class="dashboard hidden">
            
        </div>
    </main>

    <footer>
        <p>Data provided by Jolpi API (Ergast Developer API Mirror)</p>
    </footer>

    <script src="src/app.js"></script>
</body>
</html>
