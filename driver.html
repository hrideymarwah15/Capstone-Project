<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Profile - F1 Race Intelligence</title>
    <!-- Google Fonts: Inter and Racing Sans One -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Racing+Sans+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/style.css">
    <style>
        .profile-container {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-top: 4px solid var(--accent-red);
            max-width: 800px;
            margin: 0 auto;
        }
        .profile-header h2 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        .profile-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .stat-box {
            background-color: var(--bg-color);
            padding: 1.5rem;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #ddd;
        }
        .dark-mode .stat-box {
            border-color: #444;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent-red);
            margin-top: 0.5rem;
        }
        .stat-label {
            font-size: 0.9rem;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <header>
        <h1>🏎️ Driver Profile</h1>
        <p id="driver-subtitle">Loading data...</p>
        
        <div class="controls-container">
            <a href="index.html" class="btn" style="text-decoration: none;">🔙 Back to Standings</a>
            <button id="theme-toggle" class="btn theme-btn">🌙 Dark Mode</button>
        </div>
    </header>

    <main>
        <div id="loading" class="status-message">
            Fetching driver details... 🏁
        </div>

        <div id="error" class="status-message error hidden">
            Failed to retrieve driver data. Please go back and try again.
        </div>

        <div id="driver-details" class="profile-container hidden">
            
        </div>
    </main>

    <footer>
        <p>Data provided by Jolpi API (Ergast Developer API Mirror)</p>
    </footer>

    <script src="src/driver.js"></script>
</body>
</html>
